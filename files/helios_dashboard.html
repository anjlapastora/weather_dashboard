<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helios — Solar & Wind Monitor</title>
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
<link rel="icon" type="image/png" sizes="48x48" href="favicon/favicon-48.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0B0F1A;
    --panel:      #141824;
    --panel2:     #1A2035;
    --border:     #1E2A40;
    --border2:    #2A3550;
    --text:       #E2E8F0;
    --muted:      #64748B;
    --muted2:     #94A3B8;
    --accent:     #00D4FF;
    --accent-dim: rgba(0,212,255,0.12);
    --riyadh:     #F59E0B;
    --wellington: #60A5FA;
    --manila:     #34D399;
    --danger:     #EF4444;
    --danger-dim: rgba(239,68,68,0.15);
    --sidebar-w:  260px;
    --radius:     10px;
    --radius-sm:  6px;
  }

  html, body, #root { height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-wordmark {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-wordmark span { color: var(--accent); }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sidebar-section {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Sites */
  .site-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }

  .site-item:hover { background: var(--panel2); }
  .site-item.active { background: var(--panel2); border-color: var(--border2); }

  .site-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .site-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .site-check.checked {
    border-color: transparent;
    background: var(--accent);
  }

  .site-check.checked::after {
    content: '';
    width: 9px; height: 6px;
    border-left: 2px solid #000;
    border-bottom: 2px solid #000;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .site-name { font-size: 13px; font-weight: 500; flex: 1; }
  .site-coords { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* Date inputs */
  .date-row { display: flex; flex-direction: column; gap: 8px; }

  .date-field label {
    font-size: 11px;
    color: var(--muted2);
    display: block;
    margin-bottom: 4px;
  }

  .date-field input[type="date"] {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }

  .date-field input[type="date"]:focus { border-color: var(--accent); }

  /* Anomaly controls */
  .method-tabs { display: flex; gap: 6px; margin-bottom: 12px; }

  .method-tab {
    flex: 1;
    text-align: center;
    padding: 6px 0;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    transition: all 0.15s;
  }

  .method-tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .slider-row { display: flex; flex-direction: column; gap: 6px; }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slider-header span:first-child { font-size: 11px; color: var(--muted2); }

  .slider-val {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 1px 7px;
    border-radius: 4px;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    height: 4px;
    cursor: pointer;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
  }

  .toggle-label { font-size: 12px; color: var(--muted2); }

  .toggle {
    width: 32px; height: 18px;
    background: var(--border2);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(14px); }

  /* Variable selector */
  .var-pills { display: flex; gap: 6px; }

  .var-pill {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    transition: all 0.15s;
  }

  .var-pill.active {
    background: rgba(245,158,11,0.12);
    border-color: var(--riyadh);
    color: var(--riyadh);
  }

  /* ── Main canvas ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
    background: var(--panel);
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted2);
    letter-spacing: 0.02em;
  }

  .topbar-range {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(0,212,255,0.2);
  }

  .topbar-chips { display: flex; gap: 6px; margin-left: auto; }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }

  .chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  .fetch-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fetch-btn:hover { opacity: 0.88; }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Canvas scroll area */
  .canvas {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* KPI cards */
  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; flex-shrink: 0; }

  @keyframes pulseRing {
    0%   { transform: scale(1);   opacity: 0.8; }
    70%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .kpi-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .kpi-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .kpi-site-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    letter-spacing: 0.02em;
  }

  .kpi-flag {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-ring {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    animation: pulseRing 1.8s ease-out infinite;
  }

  .kpi-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(239,68,68,0.3);
    white-space: nowrap;
    position: relative;
    z-index: 1;
  }

  .kpi-metrics { display: flex; flex-direction: column; gap: 6px; }

  .kpi-primary {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }

  .kpi-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
    line-height: 1;
  }

  .kpi-unit { font-size: 12px; color: var(--muted); font-weight: 400; }

  .kpi-secondary {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .kpi-stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .kpi-stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .kpi-stat-val { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* Chart panel */
  .chart-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .chart-legend {
    display: flex;
    gap: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted2);
  }

  .legend-line {
    width: 20px; height: 2px;
    border-radius: 1px;
  }

  .legend-marker {
    width: 8px; height: 8px;
    border-radius: 2px;
    transform: rotate(45deg);
  }

  .chart-body { padding: 0; }

  .plotly-chart { width: 100%; }

  /* Bottom row */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex-shrink: 0;
  }

  /* Anomaly table */
  .table-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-count {
    font-size: 11px;
    background: var(--danger-dim);
    color: var(--danger);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    border: 1px solid rgba(239,68,68,0.25);
  }

  .table-wrap {
    overflow-y: auto;
    max-height: 280px;
    flex: 1;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead {
    position: sticky;
    top: 0;
    background: var(--panel);
    z-index: 1;
  }

  th {
    text-align: left;
    padding: 8px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--muted2);
    font-family: 'JetBrains Mono', monospace;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--panel2); }

  .td-site {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .flag-cell {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .flag-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
  }

  .flag-solar { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
  .flag-wind  { background: rgba(96,165,250,0.15);  color: #60A5FA;  border: 1px solid rgba(96,165,250,0.3); }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* Wind roses */
  .roses-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .roses-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    padding: 8px;
    gap: 4px;
    flex: 1;
  }

  .rose-slot { min-height: 0; }

  /* Status bar */
  .status-bar {
    border-top: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel);
    flex-shrink: 0;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22C55E;
    box-shadow: 0 0 6px #22C55E;
  }

  .status-dot.error { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .status-dot.loading { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: spin 1s linear infinite; border-top-color: transparent; border-radius: 50%; }

  .status-text { font-size: 11px; color: var(--muted); }
  .status-source { font-size: 11px; color: var(--muted); margin-left: auto; }
  .status-source a { color: var(--accent); text-decoration: none; }
  .status-source a:hover { text-decoration: underline; }

  /* Loading overlay */
  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .big-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .error-box {
    background: var(--danger-dim);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--danger);
    font-size: 13px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Chatbot widget ── */
  .chatbot-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }

  .chatbot-fab {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    font-size: 22px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 22px rgba(0,212,255,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-left: auto;
  }
  .chatbot-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,212,255,0.55); }

  .chatbot-panel {
    position: absolute; bottom: calc(100% + 12px); right: 0;
    width: 340px; height: 450px;
    background: var(--panel); border: 1px solid var(--border2); border-radius: var(--radius);
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    overflow: hidden;
    animation: chatbot-in 0.18s ease;
  }
  @keyframes chatbot-in {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  .chatbot-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px;
    background: var(--panel2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chatbot-header-title {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px; color: var(--accent);
  }
  .chatbot-header-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 6px #22c55e;
    flex-shrink: 0;
  }
  .chatbot-close {
    background: none; border: none; color: var(--muted2);
    cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 4px;
    line-height: 1; transition: color 0.12s, background 0.12s;
  }
  .chatbot-close:hover { color: var(--text); background: var(--border); }

  .chatbot-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chatbot-msg {
    max-width: 88%; padding: 8px 11px; border-radius: var(--radius-sm);
    font-size: 12.5px; line-height: 1.6; white-space: pre-wrap;
  }
  .chatbot-msg-bot {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--muted2); align-self: flex-start; border-radius: 4px 10px 10px 10px;
  }
  .chatbot-msg-user {
    background: var(--accent-dim); border: 1px solid rgba(0,212,255,0.22);
    color: var(--text); align-self: flex-end; border-radius: 10px 4px 10px 10px;
  }

  .chatbot-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 12px 10px;
  }
  .chatbot-chip {
    background: var(--panel2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 4px 10px;
    font-size: 11px; color: var(--muted2); cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .chatbot-chip:hover { border-color: var(--accent); color: var(--accent); }

  .chatbot-input-row {
    display: flex; gap: 7px; padding: 10px 12px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .chatbot-input {
    flex: 1; background: var(--panel2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 12px; padding: 7px 10px; outline: none;
  }
  .chatbot-input:focus { border-color: var(--accent); }
  .chatbot-input::placeholder { color: var(--muted); }
  .chatbot-send {
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #000; cursor: pointer; font-size: 15px; font-weight: 700;
    padding: 0 13px; transition: opacity 0.12s;
  }
  .chatbot-send:hover { opacity: 0.82; }
  .chatbot-send:disabled { opacity: 0.35; cursor: default; }

  .chatbot-typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
  .chatbot-typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted2); display: inline-block;
    animation: chatbot-bounce 1.2s infinite ease-in-out;
  }
  .chatbot-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chatbot-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes chatbot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ─────────────────────────────────────────────────────────────────
const LOCATIONS = {
  riyadh: {
    key: 'riyadh', label: 'Riyadh', region: 'Saudi Arabia', emoji: '🏜️',
    lat: 24.69, lon: 46.72, tz: 'Asia/Riyadh',
    color: '#F59E0B', colorDim: 'rgba(245,158,11,0.12)', colorBorder: 'rgba(245,158,11,0.3)',
  },
  wellington: {
    key: 'wellington', label: 'Wellington', region: 'New Zealand', emoji: '🌬️',
    lat: -41.29, lon: 174.78, tz: 'Pacific/Auckland',
    color: '#60A5FA', colorDim: 'rgba(96,165,250,0.12)', colorBorder: 'rgba(96,165,250,0.3)',
  },
  manila: {
    key: 'manila', label: 'Manila', region: 'Philippines', emoji: '🌧️',
    lat: 14.60, lon: 120.98, tz: 'Asia/Manila',
    color: '#34D399', colorDim: 'rgba(52,211,153,0.12)', colorBorder: 'rgba(52,211,153,0.3)',
  },
};

const PLOTLY_LAYOUT_BASE = {
  paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
  font: { family: 'Inter, system-ui', color: '#94A3B8', size: 11 },
  xaxis: { type: 'date', gridcolor: '#1E2A40', zeroline: false, tickfont: { family: 'JetBrains Mono', size: 10 }, tickformat: '%b %d' },
  yaxis: { gridcolor: '#1E2A40', zeroline: false, tickfont: { family: 'JetBrains Mono', size: 10 } },
  legend: { x: 0, y: 1.06, orientation: 'h', font: { size: 11 }, bgcolor: 'transparent' },
  hovermode: 'x unified',
  hoverlabel: { bgcolor: '#1A2035', bordercolor: '#2A3550', font: { family: 'Inter, system-ui', size: 12 } },
};

const PLOTLY_CONFIG = {
  displayModeBar: true,
  modeBarButtonsToRemove: ['select2d','lasso2d','autoScale2d'],
  displaylogo: false, responsive: true,
};

// ── Date helpers ──────────────────────────────────────────────────────────────
const toISO = d => d.toISOString().slice(0, 10);
function yesterday() { const d = new Date(); d.setDate(d.getDate() - 1); return d; }
function daysAgo(n)  { const d = new Date(); d.setDate(d.getDate() - n); return d; }
function addDays(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return toISO(d); }
const MAX_RANGE_DAYS = 30;

// ── API fetch — Flask backend ─────────────────────────────────────────────────
async function fetchSiteData(siteKey, startDate, endDate) {
  const url = `http://localhost:5000/api/data?site=${siteKey}&start=${startDate}&end=${endDate}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status} for ${siteKey}`);
  const json = await res.json();

  if (!json.data || !Array.isArray(json.data)) {
    throw new Error(`Unexpected response shape for ${siteKey}`);
  }

  return json.data.map(r => ({
    time:         new Date(r.observed_at),
    timeStr:      r.observed_at,
    solar:        r.solar_ghi      ?? null,
    solarDirect:  r.solar_direct   ?? null,
    wind:         r.wind_speed     ?? null,
    gusts:        r.wind_gusts     ?? null,
    windDir:      r.wind_direction ?? null,
    solarAnomaly: r.solar_anomaly  === 1,
    windAnomaly:  r.wind_anomaly   === 1,
    isDaytime:    r.is_daytime     === 1,
    qualityFlag:  r.quality_flag   ?? 'ok',
  }));
}

// ── Statistics ────────────────────────────────────────────────────────────────
function calcStats(rows) {
  if (!rows || rows.length === 0) return null;

  const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  const max = arr => arr.length ? Math.max(...arr) : 0;

  // Use isDaytime from backend to avoid nighttime zeros pulling down avg
  const solarDay = rows.filter(r => r.isDaytime && r.solar != null).map(r => r.solar);
  const allSolar = rows.filter(r => r.solar != null && r.solar > 0).map(r => r.solar);
  const windAll  = rows.filter(r => r.wind  != null && r.wind  > 0).map(r => r.wind);
  const gustAll  = rows.filter(r => r.gusts != null && r.gusts > 0).map(r => r.gusts);

  return {
    avgSolar:          avg(solarDay),
    maxSolar:          max(allSolar),
    avgWind:           avg(windAll),
    maxWind:           max(gustAll.length ? gustAll : windAll),
    solarAnomalyCount: rows.filter(r => r.solarAnomaly).length,
    windAnomalyCount:  rows.filter(r => r.windAnomaly).length,
  };
}

// ── KPI Card ──────────────────────────────────────────────────────────────────
function KpiCard({ site, stats, loading }) {
  const total = stats ? stats.solarAnomalyCount + stats.windAnomalyCount : 0;

  return (
    <div className="kpi-card" style={{ borderTop: `2px solid ${site.color}` }}>
      <div className="kpi-header">
        <div>
          <div className="kpi-site-name" style={{ color: site.color }}>{site.emoji} {site.label}</div>
          <div style={{ fontSize: 10, color: '#4B5563', marginTop: 1 }}>{site.region}</div>
        </div>
        {total > 0 && (
          <div className="kpi-flag">
            <div className="pulse-ring" style={{ background: '#EF4444' }} />
            <div className="kpi-badge">⚠ {total} anomalies</div>
          </div>
        )}
      </div>

      {loading ? (
        <div style={{ color: '#4B5563', fontSize: 12, padding: '8px 0' }}>Loading…</div>
      ) : stats ? (
        <div className="kpi-metrics">
          <div className="kpi-primary">
            <div className="kpi-value" style={{ color: site.color }}>{Math.round(stats.avgSolar)}</div>
            <div className="kpi-unit">W/m² avg solar</div>
          </div>
          <div className="kpi-secondary">
            <div className="kpi-stat">
              <div className="kpi-stat-label">Peak Solar</div>
              <div className="kpi-stat-val">{Math.round(stats.maxSolar)} W/m²</div>
            </div>
            <div className="kpi-stat">
              <div className="kpi-stat-label">Avg Wind</div>
              <div className="kpi-stat-val">{stats.avgWind.toFixed(1)} km/h</div>
            </div>
            <div className="kpi-stat">
              <div className="kpi-stat-label">Max Gust</div>
              <div className="kpi-stat-val">{Math.round(stats.maxWind)} km/h</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ color: '#4B5563', fontSize: 12, padding: '8px 0' }}>No data loaded</div>
      )}
    </div>
  );
}

// ── Time Series Chart ─────────────────────────────────────────────────────────
function TimeSeriesChart({ allData, activeSites, primaryVar, showAnomalies, showSecondary }) {
  const divRef = useRef(null);
  const isSolar = primaryVar === 'solar';

  useEffect(() => {
    if (!divRef.current) return;
    const el = divRef.current;
    const traces = [];

    activeSites.forEach(key => {
      const site = LOCATIONS[key];
      const rows = allData[key];
      if (!rows || rows.length === 0) return;

      const times     = rows.map(r => r.timeStr);
      const primary   = rows.map(r => isSolar ? r.solar : r.wind);
      const secondary = rows.map(r => isSolar ? r.wind  : r.solar);
      const primLabel = isSolar ? 'Solar GHI' : 'Wind Speed';
      const secLabel  = isSolar ? 'Wind'      : 'Solar GHI';

      // Primary line
      traces.push({
        x: times, y: primary,
        type: 'scatter', mode: 'lines',
        name: site.label,
        line: { color: site.color, width: 1.5 },
        legendgroup: key,
        hovertemplate: `<b>${site.label}</b><br>%{x|%b %d %H:%M}<br>${primLabel}: <b>%{y:.1f}</b><extra></extra>`,
      });

      // Anomaly markers
      if (showAnomalies) {
        const anomRows = rows.filter(r => isSolar ? r.solarAnomaly : r.windAnomaly);
        if (anomRows.length > 0) {
          traces.push({
            x: anomRows.map(r => r.timeStr),
            y: anomRows.map(r => isSolar ? r.solar : r.wind),
            type: 'scatter', mode: 'markers',
            name: `${site.label} ⚠`,
            legendgroup: key, showlegend: false,
            marker: { color: '#EF4444', size: 7, symbol: 'x', line: { width: 1.5, color: '#fff' } },
            hovertemplate: `<b>⚠ Anomaly – ${site.label}</b><br>%{x|%b %d %H:%M}<br>${primLabel}: <b>%{y:.1f}</b><extra></extra>`,
          });
        }
      }

      // Secondary overlay (dotted, right y-axis)
      if (showSecondary) {
        traces.push({
          x: times, y: secondary,
          type: 'scatter', mode: 'lines',
          name: `${site.label} — ${secLabel}`,
          legendgroup: key, showlegend: true,
          line: { color: site.color, width: 1.5, dash: 'dot' },
          yaxis: 'y2', opacity: 0.7,
          hovertemplate: `<b>${site.label}</b><br>%{x|%b %d %H:%M}<br>${secLabel}: <b>%{y:.1f}</b><extra></extra>`,
        });
      }
    });

    const layout = {
      ...PLOTLY_LAYOUT_BASE,
      height: 320,
      margin: { l: 56, r: showSecondary ? 60 : 16, t: 8, b: 40 },
      yaxis: {
        ...PLOTLY_LAYOUT_BASE.yaxis,
        title: { text: isSolar ? 'Solar GHI (W/m²)' : 'Wind Speed (km/h)', font: { size: 10 } },
      },
      ...(showSecondary ? {
        yaxis2: {
          overlaying: 'y', side: 'right',
          gridcolor: 'transparent', zeroline: false,
          tickfont: { family: 'JetBrains Mono', size: 9, color: '#94A3B8' },
          title: { text: isSolar ? 'Wind (km/h)' : 'Solar (W/m²)', font: { size: 9, color: '#94A3B8' } },
        },
      } : {}),
    };

    Plotly.react(el, traces, layout, PLOTLY_CONFIG);
  }, [allData, activeSites, primaryVar, showAnomalies, showSecondary]);

  return <div ref={divRef} style={{ width: '100%', height: 320 }} />;
}

// ── Wind Rose ─────────────────────────────────────────────────────────────────
function WindRose({ site, rows }) {
  const divRef = useRef(null);

  useEffect(() => {
    if (!divRef.current || !rows || rows.length === 0) return;

    const dirs = rows.filter(r => r.windDir != null).map(r => r.windDir);
    const numBins = 16;
    const binSize = 360 / numBins;
    const counts = new Array(numBins).fill(0);
    dirs.forEach(d => { counts[Math.round(d / binSize) % numBins]++; });

    const labels = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

    Plotly.react(divRef.current, [{
      type: 'barpolar',
      r:     [...counts, counts[0]],
      theta: [...labels, labels[0]],
      marker: { color: site.color, opacity: 0.85, line: { color: 'rgba(0,0,0,0.2)', width: 0.5 } },
    }], {
      polar: {
        bgcolor: 'transparent',
        angularaxis: {
          direction: 'clockwise', rotation: 90,
          tickfont: { size: 9, color: '#64748B', family: 'Inter' },
          gridcolor: '#1E2A40', linecolor: '#1E2A40',
        },
        radialaxis: { showticklabels: false, gridcolor: '#1E2A40', linecolor: 'transparent' },
      },
      paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
      margin: { l: 20, r: 20, t: 28, b: 10 },
      title: { text: `${site.emoji} ${site.label}`, font: { size: 11, color: site.color, family: 'Inter' }, x: 0.5 },
      showlegend: false,
    }, { ...PLOTLY_CONFIG, displayModeBar: false });
  }, [rows]);

  return <div ref={divRef} style={{ width: '100%', height: 200 }} />;
}

// ── Anomaly Table ─────────────────────────────────────────────────────────────
function AnomalyTable({ allData, activeSites }) {
  const flagged = [];
  activeSites.forEach(key => {
    const site = LOCATIONS[key];
    const rows = allData[key];
    if (!rows) return;
    rows.filter(r => r.solarAnomaly || r.windAnomaly)
        .forEach(r => flagged.push({ site, ...r }));
  });
  flagged.sort((a, b) => b.time - a.time);

  const fmt = d => d.toLocaleString('en-US', {
    month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false,
  });

  return (
    <div className="table-panel">
      <div className="panel-header">
        <div className="panel-title"><span>⚠</span> Anomaly Log</div>
        {flagged.length > 0 && <div className="panel-count">{flagged.length} flagged hours</div>}
      </div>
      <div className="table-wrap">
        {flagged.length === 0 ? (
          <div className="empty-state">No anomalies detected.</div>
        ) : (
          <table>
            <thead>
              <tr><th>Site</th><th>Timestamp</th><th>Solar GHI</th><th>Wind</th><th>Flags</th></tr>
            </thead>
            <tbody>
              {flagged.map((r, i) => (
                <tr key={i}>
                  <td className="td-site" style={{ color: r.site.color }}>{r.site.emoji} {r.site.label}</td>
                  <td>{fmt(r.time)}</td>
                  <td>{r.solar != null ? `${Math.round(r.solar)} W/m²` : '—'}</td>
                  <td>{r.wind  != null ? `${r.wind.toFixed(1)} km/h` : '—'}</td>
                  <td>
                    <div className="flag-cell">
                      {r.solarAnomaly && <span className="flag-tag flag-solar">☀ Solar</span>}
                      {r.windAnomaly  && <span className="flag-tag flag-wind">💨 Wind</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ── Toggle ────────────────────────────────────────────────────────────────────
function Toggle({ on, onChange }) {
  return <div className={`toggle ${on ? 'on' : ''}`} onClick={() => onChange(!on)} />;
}

// ── Chatbot ───────────────────────────────────────────────────────────────────
const CHATBOT_API = 'http://localhost:8000';
const CHAT_SUGGESTIONS = ['What is Helios?', 'Explain anomaly detection', 'Tell me about Wellington', 'What is GHI?'];

function DashboardChatbot() {
  const { useState, useRef, useEffect } = React;
  const [open, setOpen]       = useState(false);
  const [messages, setMessages] = useState([{
    from: 'bot',
    text: "Hi! I'm the Helios AI assistant 🌞\nPowered by a local RAG pipeline (Ollama + ChromaDB).\nAsk me anything about this monitoring dashboard.",
  }]);
  const [input, setInput]     = useState('');
  const [loading, setLoading] = useState(false);
  const [online, setOnline]   = useState(true);
  const bottomRef = useRef(null);

  // Check chatbot service health when panel opens
  useEffect(() => {
    if (!open) return;
    fetch(`${CHATBOT_API}/health`, { signal: AbortSignal.timeout(3000) })
      .then(r => setOnline(r.ok))
      .catch(() => setOnline(false));
  }, [open]);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  async function send(text) {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput('');
    setMessages(prev => [...prev, { from: 'user', text: q }]);
    setLoading(true);
    try {
      const resp = await fetch(`${CHATBOT_API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q }),
        signal: AbortSignal.timeout(60000),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const sourceNote = data.sources?.length
        ? `\n\n📄 Sources: ${data.sources.join(', ')}`
        : '';
      setMessages(prev => [...prev, { from: 'bot', text: data.reply + sourceNote }]);
      setOnline(true);
    } catch (err) {
      const isTimeout = err.name === 'TimeoutError';
      setOnline(false);
      setMessages(prev => [...prev, {
        from: 'bot',
        text: isTimeout
          ? '⏱ The AI took too long to respond. The model may still be loading — try again in a moment.'
          : `⚠ Could not reach the chatbot service.\n\nMake sure it's running:\n  cd chatbot\n  uvicorn app:app --port 8000`,
      }]);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="chatbot-wrap">
      {open && (
        <div className="chatbot-panel">
          <div className="chatbot-header">
            <div className="chatbot-header-title">
              <div className="chatbot-header-dot" style={{ background: online ? '#22c55e' : '#ef4444', boxShadow: `0 0 6px ${online ? '#22c55e' : '#ef4444'}` }} />
              Helios AI Assistant
            </div>
            <button className="chatbot-close" onClick={() => setOpen(false)}>✕</button>
          </div>

          <div className="chatbot-messages">
            {messages.map((msg, i) => (
              <div key={i} className={`chatbot-msg chatbot-msg-${msg.from}`}>
                {msg.text}
              </div>
            ))}
            {loading && (
              <div className="chatbot-msg chatbot-msg-bot chatbot-typing">
                <span /><span /><span />
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {!loading && (
            <div className="chatbot-suggestions">
              {CHAT_SUGGESTIONS.map(s => (
                <button key={s} className="chatbot-chip" onClick={() => send(s)}>{s}</button>
              ))}
            </div>
          )}

          <div className="chatbot-input-row">
            <input
              className="chatbot-input"
              type="text"
              placeholder={loading ? 'Thinking…' : 'Ask the AI about the dashboard…'}
              value={input}
              disabled={loading}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            />
            <button className="chatbot-send" onClick={() => send()} disabled={!input.trim() || loading}>↑</button>
          </div>
        </div>
      )}
      <button className="chatbot-fab" onClick={() => setOpen(o => !o)} title="Helios AI Assistant">
        {open ? '✕' : '💬'}
      </button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeSites,   setActiveSites]   = useState(['riyadh', 'wellington', 'manila']);
  const [startDate,     setStartDate]     = useState(toISO(daysAgo(30)));
  const [endDate,       setEndDate]       = useState(toISO(new Date()));
  const [showAnomalies, setShowAnomalies] = useState(true);
  const [showSecondary, setShowSecondary] = useState(true);
  const [primaryVar,    setPrimaryVar]    = useState('solar');
  const [allData,       setAllData]       = useState({});
  const [loading,       setLoading]       = useState(false);
  const [error,         setError]         = useState(null);
  const [lastFetched,   setLastFetched]   = useState(null);

  // Compute stats per site from loaded data
  const allStats = {};
  Object.keys(allData).forEach(key => {
    allStats[key] = calcStats(allData[key]);
  });

  async function loadData() {
    if (!activeSites.length) return;
    setLoading(true);
    setError(null);
    try {
      const results = await Promise.all(
        activeSites.map(key =>
          fetchSiteData(key, startDate, endDate).then(rows => [key, rows])
        )
      );
      // Build fresh map — only contains sites from this fetch
      const map = {};
      results.forEach(([key, rows]) => { map[key] = rows; });
      setAllData(map);
      setLastFetched(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  // Auto-fetch on first load
  useEffect(() => { loadData(); }, []);

  function toggleSite(key) {
    setActiveSites(prev =>
      prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
    );
  }

  // Sites currently in allData AND active (what charts should render)
  const renderedSites = activeSites.filter(k => allData[k]);

  return (
    <div className="app">

      {/* ── Sidebar ── */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-wordmark">Helio<span>s</span></div>
          <div className="logo-sub">Solar & Wind Monitor</div>
        </div>

        {/* Sites */}
        <div className="sidebar-section">
          <div className="sidebar-label">Sites</div>
          {Object.values(LOCATIONS).map(site => (
            <div
              key={site.key}
              className={`site-item ${activeSites.includes(site.key) ? 'active' : ''}`}
              onClick={() => toggleSite(site.key)}
            >
              <div className="site-check"
                style={activeSites.includes(site.key)
                  ? { background: site.color, borderColor: 'transparent' }
                  : {}}>
                {activeSites.includes(site.key) &&
                  <span style={{ color: '#000', fontSize: 9, fontWeight: 700 }}>✓</span>}
              </div>
              <div>
                <div className="site-name">{site.emoji} {site.label}</div>
                <div className="site-coords">{site.lat}, {site.lon}</div>
              </div>
              <div className="site-dot" style={{ background: site.color, marginLeft: 'auto' }} />
            </div>
          ))}
        </div>

        {/* Date Range */}
        <div className="sidebar-section">
          <div className="sidebar-label">Date Range</div>
          <div className="date-row">
            <div className="date-field">
              <label>Start</label>
              <input type="date" value={startDate}
                min={addDays(endDate, -MAX_RANGE_DAYS)}
                max={endDate}
                onChange={e => {
                  const s = e.target.value;
                  setStartDate(s);
                  const maxEnd = addDays(s, MAX_RANGE_DAYS);
                  const today = toISO(new Date());
                  if (endDate > maxEnd) setEndDate(maxEnd < today ? maxEnd : today);
                }} />
            </div>
            <div className="date-field">
              <label>End</label>
              <input type="date" value={endDate}
                min={startDate}
                max={[addDays(startDate, MAX_RANGE_DAYS), toISO(new Date())].sort()[0]}
                onChange={e => {
                  const en = e.target.value;
                  setEndDate(en);
                  const minStart = addDays(en, -MAX_RANGE_DAYS);
                  if (startDate < minStart) setStartDate(minStart);
                }} />
            </div>
          </div>
        </div>

        {/* Anomaly */}
        <div className="sidebar-section">
          <div className="sidebar-label">Anomaly Detection</div>
          <div style={{ fontSize: 11, color: 'var(--muted2)', marginBottom: 10, lineHeight: 1.6 }}>
            Method: <span style={{ color: 'var(--accent)', fontWeight: 600 }}>IQR</span>
            <br/>Flags values beyond 1.5× the interquartile range. Computed by the backend pipeline.
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Show anomaly markers</span>
            <Toggle on={showAnomalies} onChange={setShowAnomalies} />
          </div>
        </div>

        {/* Chart Options */}
        <div className="sidebar-section">
          <div className="sidebar-label">Primary Variable</div>
          <div className="var-pills">
            <button
              className={`var-pill ${primaryVar === 'solar' ? 'active' : ''}`}
              onClick={() => setPrimaryVar('solar')}>☀ Solar</button>
            <button
              className={`var-pill ${primaryVar === 'wind' ? 'active' : ''}`}
              onClick={() => setPrimaryVar('wind')}>💨 Wind</button>
          </div>
          <div className="toggle-row" style={{ marginTop: 10 }}>
            <span className="toggle-label">Secondary overlay</span>
            <Toggle on={showSecondary} onChange={setShowSecondary} />
          </div>
        </div>

        {/* Refresh */}
        <div style={{ padding: '12px 16px 16px' }}>
          <button
            className="fetch-btn"
            onClick={loadData}
            disabled={loading || !activeSites.length}
            style={{ width: '100%', justifyContent: 'center' }}>
            {loading
              ? <><div className="spinner" /> Fetching…</>
              : '↻ Refresh Data'}
          </button>
        </div>
      </div>

      {/* ── Main canvas ── */}
      <div className="main">

        {/* Top bar */}
        <div className="topbar">
          <div className="topbar-title">MONITORING DASHBOARD</div>
          {lastFetched && (
            <div className="topbar-range">{startDate} → {endDate}</div>
          )}
          <div className="topbar-chips">
            {activeSites.map(key => {
              const s = LOCATIONS[key];
              return (
                <div key={key} className="chip"
                  style={{ color: s.color, borderColor: s.colorBorder, background: s.colorDim }}>
                  <div className="chip-dot" style={{ background: s.color }} />
                  {s.label}
                </div>
              );
            })}
          </div>
        </div>

        {/* Scrollable canvas */}
        <div className="canvas">

          {error && (
            <div className="error-box">⚠ {error} — Is Flask running at localhost:5000?</div>
          )}

          {/* KPI cards — always show all 3, greyed if not active */}
          <div className="kpi-row">
            {Object.values(LOCATIONS).map(site => (
              <KpiCard
                key={site.key}
                site={site}
                stats={allData[site.key] ? allStats[site.key] : null}
                loading={loading && activeSites.includes(site.key)}
              />
            ))}
          </div>

          {/* Time series */}
          <div className="chart-panel">
            <div className="chart-header">
              <div className="chart-title">
                <div className="chart-title-icon" />
                Hourly Time Series
              </div>
              <div className="chart-legend">
                {renderedSites.map(key => (
                  <div key={key} className="legend-item">
                    <div className="legend-line" style={{ background: LOCATIONS[key].color }} />
                    {LOCATIONS[key].label}
                  </div>
                ))}
                {showAnomalies && renderedSites.length > 0 && (
                  <div className="legend-item">
                    <div className="legend-marker" style={{ background: '#EF4444' }} />
                    Anomaly
                  </div>
                )}
              </div>
            </div>
            <div className="chart-body">
              {loading ? (
                <div className="loading-overlay">
                  <div className="big-spinner" />
                  Loading data from backend…
                </div>
              ) : renderedSites.length > 0 ? (
                <TimeSeriesChart
                  allData={allData}
                  activeSites={renderedSites}
                  primaryVar={primaryVar}
                  showAnomalies={showAnomalies}
                  showSecondary={showSecondary}
                />
              ) : (
                <div className="loading-overlay" style={{ color: '#4B5563' }}>
                  Select sites and click Refresh Data
                </div>
              )}
            </div>
          </div>

          {/* Anomaly table + Wind roses */}
          <div className="bottom-row">
            <AnomalyTable allData={allData} activeSites={renderedSites} />

            <div className="roses-panel">
              <div className="panel-header">
                <div className="panel-title">🧭 Wind Direction Distribution</div>
              </div>
              <div className="roses-grid">
                {Object.values(LOCATIONS).map(site => (
                  <div key={site.key} className="rose-slot">
                    {allData[site.key] ? (
                      <WindRose site={site} rows={allData[site.key]} />
                    ) : (
                      <div style={{
                        height: 200, display: 'flex', alignItems: 'center',
                        justifyContent: 'center', color: '#4B5563', fontSize: 12,
                      }}>
                        {activeSites.includes(site.key) ? 'Loading…' : 'Not selected'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>

        </div>{/* end .canvas */}

        {/* Status bar */}
        <div className="status-bar">
          <div className={`status-dot ${loading ? 'loading' : error ? 'error' : ''}`} />
          <div className="status-text">
            {loading
              ? 'Fetching data…'
              : error
              ? 'Connection error — check Flask is running'
              : lastFetched
              ? `Last updated ${lastFetched.toLocaleTimeString()}`
              : 'Ready'}
          </div>
          <div className="status-source">
            Data: <a href="https://open-meteo.com" target="_blank" rel="noreferrer">Open-Meteo Archive API</a>
            · CC BY 4.0 · No API key required
          </div>
        </div>

      </div>{/* end .main */}

      <DashboardChatbot />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
